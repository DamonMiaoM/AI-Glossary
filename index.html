<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI & 技术词汇表</title>
<style>
  :root {
    --bg:          #F4FAF0;
    --surface:     #FFFFFF;
    --surface2:    #EBF5E8;
    --border:      #D0E8D4;
    --accent:      #3D8B5E;
    --accent-h:    #2C7A4F;
    --accent2:     #1A6B3C;
    --text:        #1C2B1E;
    --text2:       #5A7A62;
    --tag-bg:      #E8F3EA;
    --danger:      #D65C5C;
    --card-hover:  #F0FAF2;
    --shadow:      rgba(61,139,94,0.10);
  }
  [data-theme="dark"] {
    --bg:          #0F1A12;
    --surface:     #1A2A1E;
    --surface2:    #223026;
    --border:      #2E4A34;
    --accent:      #4EAD74;
    --accent-h:    #3D9060;
    --accent2:     #6DC98F;
    --text:        #D8F0DF;
    --text2:       #7AAE8A;
    --tag-bg:      #1E3524;
    --danger:      #E06B6B;
    --card-hover:  #1E3225;
    --shadow:      rgba(0,0,0,0.35);
  }
  .theme-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 7px 13px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .theme-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--surface2); }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 1px 8px var(--shadow);
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon { font-size: 24px; }
  .logo h1 { font-size: 18px; font-weight: 700; color: var(--text); }
  .logo span { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .count-badge {
    background: var(--surface2);
    color: var(--accent);
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 20px;
    font-weight: 600;
    border: 1px solid var(--border);
    white-space: nowrap;
  }

  /* ── Main Layout ── */
  .container { max-width: 1200px; margin: 0 auto; padding: 28px 32px; }

  /* ── Toolbar ── */
  .toolbar {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
    align-items: center;
  }
  .search-wrap {
    flex: 1;
    min-width: 240px;
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 16px 10px 40px;
    border-radius: 10px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-wrap input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(61,139,94,0.12);
  }
  .search-wrap input::placeholder { color: #9EB8A4; }
  .search-wrap .search-icon {
    position: absolute;
    left: 13px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text2);
    font-size: 16px;
    pointer-events: none;
  }
  .filter-group { display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--surface2); }
  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
    font-weight: 600;
  }
  .btn-add {
    background: var(--accent);
    border: none;
    color: white;
    padding: 10px 18px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
    transition: background 0.2s;
  }
  .btn-add:hover { background: var(--accent-h); }

  /* ── Cards Grid ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    transition: all 0.2s;
    cursor: pointer;
    position: relative;
  }
  .card:hover {
    background: var(--card-hover);
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px var(--shadow);
  }
  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .term-block { flex: 1; }
  .term-en {
    font-size: 20px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.3px;
  }
  .term-full {
    font-size: 12px;
    color: var(--accent);
    margin-top: 3px;
    font-weight: 500;
  }
  .term-zh {
    font-size: 14px;
    color: var(--accent2);
    font-weight: 600;
    margin-top: 4px;
  }

  /* ── Category Tags ── */
  .tag {
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 6px;
    white-space: nowrap;
    font-weight: 600;
    border: 1px solid transparent;
  }
  .tag.cat-core  { background: #DCF0FF; color: #1A6FA8; border-color: #B8DEFF; }
  .tag.cat-agent { background: #D8F5E4; color: #1A7A45; border-color: #A8E8C4; }
  .tag.cat-infra { background: #FFF0D8; color: #A06010; border-color: #F5D8A0; }
  .tag.cat-model { background: #EFE0FF; color: #6B30A8; border-color: #D8BAFF; }
  .tag.cat-data  { background: #D8F5F0; color: #1A7A6A; border-color: #A8E8E0; }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 12px 0;
  }
  .desc-en {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.6;
    margin-bottom: 8px;
  }
  .desc-zh {
    font-size: 13px;
    color: var(--text);
    line-height: 1.7;
  }
  .card-footer {
    margin-top: 14px;
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .card:hover .card-footer { opacity: 1; }
  .btn-sm {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-sm:hover { border-color: var(--accent); color: var(--accent); background: var(--surface2); }
  .btn-sm.delete:hover { border-color: var(--danger); color: var(--danger); background: #FFF0F0; }

  /* ── Empty State ── */
  .empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--text2);
    grid-column: 1 / -1;
  }
  .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty h3 { font-size: 18px; margin-bottom: 8px; color: var(--text); }

  /* ── Modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(28,43,30,0.35);
    backdrop-filter: blur(4px);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 32px;
    width: 560px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(61,139,94,0.15);
  }
  .modal h2 { font-size: 20px; margin-bottom: 24px; color: var(--text); }
  .form-group { margin-bottom: 18px; }
  .form-group label {
    display: block;
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 6px;
    font-weight: 500;
  }
  .form-group label span { color: var(--accent); }
  .form-group input,
  .form-group textarea,
  .form-group select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 14px;
    outline: none;
    font-family: inherit;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .form-group input:focus,
  .form-group textarea:focus,
  .form-group select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(61,139,94,0.12);
  }
  .form-group textarea { resize: vertical; min-height: 80px; line-height: 1.6; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 24px;
  }
  .btn-cancel {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 10px 20px;
    border-radius: 10px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-cancel:hover { border-color: var(--text2); color: var(--text); }
  .btn-save {
    background: var(--accent);
    border: none;
    color: white;
    padding: 10px 24px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-save:hover { background: var(--accent-h); }

  /* ── Detail Modal ── */
  .detail-term { font-size: 32px; font-weight: 800; margin-bottom: 4px; color: var(--text); }
  .detail-full { color: var(--accent); font-size: 14px; margin-bottom: 4px; font-weight: 500; }
  .detail-zh { color: var(--accent2); font-size: 18px; font-weight: 600; margin-bottom: 20px; }
  .detail-section { margin-bottom: 18px; }
  .detail-section h4 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text2);
    margin-bottom: 8px;
    font-weight: 600;
  }
  .detail-section p { font-size: 14px; line-height: 1.8; color: var(--text); }
  .detail-section p.en-text { color: var(--text2); }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: var(--surface);
    border: 1px solid var(--accent);
    color: var(--text);
    padding: 12px 20px;
    border-radius: 12px;
    font-size: 14px;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    z-index: 999;
    pointer-events: none;
    box-shadow: 0 4px 16px var(--shadow);
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* ── View Toggle ── */
  .view-toggle {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .view-btn {
    background: transparent;
    border: none;
    color: var(--text2);
    padding: 8px 12px;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.15s;
    line-height: 1;
  }
  .view-btn:hover { color: var(--text); background: var(--surface2); }
  .view-btn.active { background: var(--accent); color: white; }

  /* ── List View ── */
  .list-view { display: flex; flex-direction: column; gap: 0; }
  .list-view .list-header-row {
    display: grid;
    grid-template-columns: 160px 140px 1fr 110px 90px;
    gap: 0;
    padding: 10px 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px 10px 0 0;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text2);
    font-weight: 600;
  }
  .list-row {
    display: grid;
    grid-template-columns: 160px 140px 1fr 110px 90px;
    gap: 0;
    padding: 13px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: none;
    cursor: pointer;
    transition: background 0.15s;
    align-items: center;
  }
  .list-row:last-child { border-radius: 0 0 10px 10px; }
  .list-row:hover { background: var(--card-hover); }
  .list-row:hover .row-actions { opacity: 1; }
  .list-col-term { font-weight: 700; font-size: 14px; color: var(--text); }
  .list-col-zh { font-size: 13px; color: var(--accent2); font-weight: 500; }
  .list-col-desc {
    font-size: 12px; color: var(--text2); line-height: 1.5;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 16px;
  }
  .row-actions { display: flex; gap: 6px; opacity: 0; transition: opacity 0.15s; }

  /* ── Export / Import bar ── */
  .io-bar {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-bottom: 16px;
  }
  .btn-io {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    display: flex; align-items: center; gap: 5px;
    transition: all 0.15s;
  }
  .btn-io:hover { border-color: var(--accent); color: var(--accent); background: var(--surface2); }

  /* ── Mobile Responsive ── */
  @media (max-width: 640px) {
    header { padding: 12px 16px; gap: 8px; flex-wrap: wrap; }
    .logo h1 { font-size: 15px; }
    .logo span { display: none; }
    .logo-icon { font-size: 20px; }
    .header-right { gap: 8px; }
    .count-badge { font-size: 11px; padding: 3px 8px; white-space: nowrap; }
    .theme-btn { padding: 6px 10px; font-size: 12px; }
    .btn-add { padding: 8px 12px; font-size: 13px; }
    .container { padding: 16px; }
    .toolbar { gap: 8px; margin-bottom: 16px; }
    .filter-group { gap: 6px; }
    .filter-btn { padding: 6px 10px; font-size: 12px; }
    .io-bar { gap: 6px; }
    .btn-io { padding: 6px 10px; font-size: 11px; }
    .grid { grid-template-columns: 1fr; gap: 12px; }
    .tab-nav { padding: 0 12px; }
    .tab-item { padding: 12px 14px; font-size: 13px; }
    .modal { padding: 20px 16px; }
    .form-row { grid-template-columns: 1fr; }
  }

  /* ── Tab Navigation ── */
  .tab-nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    box-shadow: 0 1px 4px var(--shadow);
  }
  .tab-nav::-webkit-scrollbar { display: none; }
  .tab-item {
    background: transparent;
    border: none;
    border-bottom: 3px solid transparent;
    color: var(--text2);
    padding: 14px 22px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 7px;
    font-family: inherit;
    margin-bottom: -1px;
  }
  .tab-item:hover { color: var(--text); background: var(--surface2); }
  .tab-item.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 700; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-icon">🌿</span>
    <div>
      <h1>AI & 技术词汇表</h1>
      <span>Claude Code · Agent · 工具链</span>
    </div>
  </div>
  <div class="header-right">
    <span class="count-badge" id="totalCount">0 个词条</span>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">🌙 深色</button>
    <button class="btn-add" onclick="openAddModal()">＋ 添加词汇</button>
  </div>
</header>

<nav class="tab-nav" id="tabNav">
  <button class="tab-item active" onclick="switchTab('ai', this)">🤖 AI Glossaries</button>
  <button class="tab-item" onclick="switchTab('github', this)">🐙 GitHub Terms</button>
  <button class="tab-item" onclick="switchTab('books', this)">📚 Books</button>
  <button class="tab-item" onclick="switchTab('figures', this)">🌟 Figures</button>
  <button class="tab-item" onclick="switchTab('movies', this)">🎬 Movies</button>
</nav>

<div class="container">
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="搜索词汇（支持英文缩写、中文名称、解释内容）…" oninput="renderCards()">
    </div>
    <div class="filter-group" id="filterGroup">
      <button class="filter-btn active" onclick="setFilter('all', this)">全部</button>
      <button class="filter-btn" onclick="setFilter('核心概念', this)">核心概念</button>
      <button class="filter-btn" onclick="setFilter('Agent', this)">Agent</button>
      <button class="filter-btn" onclick="setFilter('基础设施', this)">基础设施</button>
      <button class="filter-btn" onclick="setFilter('模型与算法', this)">模型与算法</button>
      <button class="filter-btn" onclick="setFilter('数据与存储', this)">数据与存储</button>
    </div>
    <div class="view-toggle">
      <button class="view-btn active" id="btnGrid" onclick="setView('grid')" title="卡片视图">⊞</button>
      <button class="view-btn" id="btnList" onclick="setView('list')" title="列表视图">☰</button>
    </div>
  </div>

  <div class="io-bar">
    <button class="btn-io" onclick="exportJSON()">⬇ 导出 JSON</button>
    <button class="btn-io" onclick="document.getElementById('importFile').click()">⬆ 导入 JSON</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">
  </div>

  <div class="grid" id="cardGrid"></div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h2 id="modalTitle">➕ 添加新词汇</h2>
    <div class="form-row">
      <div class="form-group">
        <label>缩写 / 英文名称 <span>*</span></label>
        <input type="text" id="f_term" placeholder="e.g. RAG, Agent, API">
      </div>
      <div class="form-group">
        <label>完整英文名称</label>
        <input type="text" id="f_full" placeholder="e.g. Retrieval-Augmented Generation">
      </div>
    </div>
    <div class="form-group">
      <label>中文译名 <span>*</span></label>
      <input type="text" id="f_zh" placeholder="e.g. 检索增强生成">
    </div>
    <div class="form-group">
      <label>分类</label>
      <select id="f_cat">
        <option value="核心概念">核心概念</option>
        <option value="Agent">Agent</option>
        <option value="基础设施">基础设施</option>
        <option value="模型与算法">模型与算法</option>
        <option value="数据与存储">数据与存储</option>
      </select>
    </div>
    <div class="form-group">
      <label>英文解释</label>
      <textarea id="f_desc_en" placeholder="Brief explanation in English…"></textarea>
    </div>
    <div class="form-group">
      <label>中文解释 <span>*</span></label>
      <textarea id="f_desc_zh" placeholder="用自己的话解释这个概念，越具体越好…"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal('addModal')">取消</button>
      <button class="btn-save" onclick="saveWord()">保存词汇</button>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div id="detailContent"></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal('detailModal')">关闭</button>
      <button class="btn-save" id="detailEditBtn">编辑</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── 分类 → CSS class 映射 ───
const catClass = {
  // AI Glossaries
  '核心概念': 'cat-core', 'Agent': 'cat-agent',
  '基础设施': 'cat-infra', '模型与算法': 'cat-model', '数据与存储': 'cat-data',
  // GitHub Terms
  'Repository': 'cat-core', 'Workflow': 'cat-agent',
  'Collaboration': 'cat-infra', 'Security': 'cat-model', 'CI/CD': 'cat-data',
  // Books
  'AI & Tech': 'cat-core', 'Business': 'cat-agent',
  'Philosophy': 'cat-infra', 'Science': 'cat-model', 'Self-help': 'cat-data',
  // Figures
  'AI Research': 'cat-core', 'Entrepreneur': 'cat-agent',
  'Philosophy': 'cat-infra', 'Science': 'cat-model', 'Media': 'cat-data',

const tabWords = {

// ─── Theme Toggle ───
function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const next = isDark ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('vocab-theme', next);
  document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️ 浅色' : '🌙 深色';
}

function applyTheme() {
  const saved = localStorage.getItem('vocab-theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
  const btn = document.getElementById('themeBtn');
  if (btn) btn.textContent = saved === 'dark' ? '☀️ 浅色' : '🌙 深色';
}

// ─── Tab Switching ───
function switchTab(tabId, btn) {
  tabWords[currentTab] = words; // save current tab's changes
  currentTab = tabId;
  words = tabWords[tabId];
  currentFilter = 'all';

  document.querySelectorAll('.tab-item').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');

  const cfg = TABS_CONFIG[tabId];
  const filterGroup = document.getElementById('filterGroup');
  filterGroup.innerHTML = `<button class="filter-btn active" onclick="setFilter('all', this)">全部</button>` +
    cfg.filters.map(f => `<button class="filter-btn" onclick="setFilter('${f.replace(/'/g,"\\'")}', this)">${f}</button>`).join('');

  document.getElementById('searchInput').placeholder = cfg.placeholder;
  document.getElementById('searchInput').value = '';
  document.querySelector('.btn-add').textContent = cfg.addLabel;
  renderCards();
}

// ─── Init ───
function init() {
  applyTheme();
  switchTab('ai', document.querySelector('.tab-item'));
}

// ─── View Toggle ───
function setView(v) {
  currentView = v;
  document.getElementById('btnGrid').classList.toggle('active', v === 'grid');
  document.getElementById('btnList').classList.toggle('active', v === 'list');
  renderCards();
}

// ─── Render ───
function renderCards() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const grid = document.getElementById('cardGrid');

  const filtered = words.filter(w => {
    const matchCat = currentFilter === 'all' || w.cat === currentFilter;
    const matchQ = !q || [w.term, w.full, w.zh, w.desc_en, w.desc_zh, w.cat]
      .some(s => s && s.toLowerCase().includes(q));
    return matchCat && matchQ;
  });

  document.getElementById('totalCount').textContent = words.length + ' 个词条';

  if (filtered.length === 0) {
    grid.className = 'grid';
    grid.innerHTML = `
      <div class="empty" style="grid-column:1/-1">
        <div class="empty-icon">🔭</div>
        <h3>没有找到匹配的词汇</h3>
        <p style="color:var(--text2);margin-top:8px">换个关键词，或者添加这个新词汇吧</p>
      </div>`;
    return;
  }

  if (currentView === 'list') {
    grid.className = 'list-view';
    grid.innerHTML = `
      <div class="list-header-row">
        <span>词汇</span><span>中文译名</span><span>中文解释</span><span>分类</span><span></span>
      </div>
      ${filtered.map(w => `
        <div class="list-row" onclick="openDetail(${w.id})">
          <div class="list-col-term">
            ${w.term}
            ${w.full && w.full !== w.term ? `<div style="font-size:11px;color:var(--accent);font-weight:400;margin-top:2px">${w.full}</div>` : ''}
          </div>
          <div class="list-col-zh">${w.zh}</div>
          <div class="list-col-desc">${w.desc_zh}</div>
          <div class="list-col-cat"><span class="tag ${catClass[w.cat] || ''}">${w.cat}</span></div>
          <div class="row-actions">
            <button class="btn-sm" onclick="event.stopPropagation(); openEdit(${w.id})">编辑</button>
            <button class="btn-sm delete" onclick="event.stopPropagation(); deleteWord(${w.id})">删除</button>
          </div>
        </div>
      `).join('')}`;
    return;
  }

  grid.className = 'grid';
  grid.innerHTML = filtered.map(w => `
    <div class="card" onclick="openDetail(${w.id})">
      <div class="card-header">
        <div class="term-block">
          <div class="term-en">${w.term}</div>
          ${w.full && w.full !== w.term ? `<div class="term-full">${w.full}</div>` : ''}
          <div class="term-zh">${w.zh}</div>
        </div>
        <span class="tag ${catClass[w.cat] || ''}">${w.cat}</span>
      </div>
      <div class="divider"></div>
      ${w.desc_en ? `<div class="desc-en">${w.desc_en.length > 100 ? w.desc_en.slice(0,100)+'…' : w.desc_en}</div>` : ''}
      <div class="desc-zh">${w.desc_zh.length > 80 ? w.desc_zh.slice(0,80)+'…' : w.desc_zh}</div>
      <div class="card-footer">
        <button class="btn-sm" onclick="event.stopPropagation(); openEdit(${w.id})">编辑</button>
        <button class="btn-sm delete" onclick="event.stopPropagation(); deleteWord(${w.id})">删除</button>
      </div>
    </div>
  `).join('');
}

// ─── Filter ───
function setFilter(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

// ─── Detail ───
function openDetail(id) {
  const w = words.find(x => x.id === id);
  if (!w) return;
  document.getElementById('detailContent').innerHTML = `
    <div class="detail-term">${w.term}</div>
    ${w.full && w.full !== w.term ? `<div class="detail-full">${w.full}</div>` : ''}
    <div class="detail-zh">${w.zh}</div>
    <span class="tag ${catClass[w.cat] || ''}" style="display:inline-block;margin-bottom:20px">${w.cat}</span>
    <div class="divider"></div>
    ${w.desc_en ? `
    <div class="detail-section" style="margin-top:16px">
      <h4>English Explanation</h4>
      <p class="en-text">${w.desc_en}</p>
    </div>` : ''}
    <div class="detail-section" style="margin-top:16px">
      <h4>中文解释</h4>
      <p>${w.desc_zh}</p>
    </div>
  `;
  document.getElementById('detailEditBtn').onclick = () => { closeModal('detailModal'); openEdit(id); };
  document.getElementById('detailModal').classList.add('open');
}

// ─── Add / Edit Modal ───
function openAddModal() {
  editingId = null;
  const cfg = TABS_CONFIG[currentTab];
  document.getElementById('modalTitle').textContent = cfg.addLabel;
  ['f_term','f_full','f_zh','f_desc_en','f_desc_zh'].forEach(id => document.getElementById(id).value = '');
  const catSel = document.getElementById('f_cat');
  catSel.innerHTML = cfg.filters.map(f => `<option value="${f}">${f}</option>`).join('');
  catSel.value = cfg.filters[0];
  document.getElementById('addModal').classList.add('open');
  setTimeout(() => document.getElementById('f_term').focus(), 100);
}

function openEdit(id) {
  const w = words.find(x => x.id === id);
  if (!w) return;
  editingId = id;
  const cfg = TABS_CONFIG[currentTab];
  document.getElementById('modalTitle').textContent = '✏️ 编辑';
  document.getElementById('f_term').value = w.term;
  document.getElementById('f_full').value = w.full || '';
  document.getElementById('f_zh').value = w.zh;
  const catSel = document.getElementById('f_cat');
  catSel.innerHTML = cfg.filters.map(f => `<option value="${f}">${f}</option>`).join('');
  catSel.value = w.cat;
  document.getElementById('f_desc_en').value = w.desc_en || '';
  document.getElementById('f_desc_zh').value = w.desc_zh;
  document.getElementById('addModal').classList.add('open');
}

function saveWord() {
  const term = document.getElementById('f_term').value.trim();
  const zh = document.getElementById('f_zh').value.trim();
  const desc_zh = document.getElementById('f_desc_zh').value.trim();
  if (!term || !zh || !desc_zh) { showToast('⚠️ 请填写缩写、中文译名和中文解释'); return; }

  const entry = {
    id: editingId || Date.now(),
    term,
    full: document.getElementById('f_full').value.trim(),
    zh,
    cat: document.getElementById('f_cat').value,
    desc_en: document.getElementById('f_desc_en').value.trim(),
    desc_zh,
  };

  if (editingId) {
    const idx = words.findIndex(x => x.id === editingId);
    words[idx] = entry;
    showToast('✅ 已更新');
  } else {
    words.unshift(entry);
    tabWords[currentTab] = words;
    showToast('✅ 已添加');
  }

  renderCards();
  closeModal('addModal');
}

function deleteWord(id) {
  if (!confirm('确认删除这个词汇？')) return;
  words = words.filter(x => x.id !== id);
  tabWords[currentTab] = words;
  renderCards();
  showToast('🗑️ 已删除');
}

// ─── Export / Import ───
function exportJSON() {
  const blob = new Blob([JSON.stringify(words, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${currentTab}-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  showToast('✅ 已导出 JSON');
}

function importJSON(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const imported = JSON.parse(ev.target.result);
      if (!Array.isArray(imported)) throw new Error();
      words = imported;
      renderCards();
      showToast(`✅ 已导入 ${imported.length} 个词条`);
    } catch {
      showToast('❌ JSON 文件格式错误');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ─── Modal ───
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('open'));
});

// ─── Toast ───
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

init();
</script>
</body>
</html>
